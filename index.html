<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mia Galleria</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f4f4f9; text-align: center; }
        h1 { color: #333; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; max-width: 1200px; margin: 20px auto; }
        .gallery img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    
    <div class="gallery">
        <!-- Modifica i percorsi qui sotto con i nomi reali delle tue immagini -->
        <img src="immagini/ListinoPrezzi.png" alt="Foto 1">
        <img src="immagini/PrimiDelGiorno.png" alt="Foto 2">
    </div>

</body>
